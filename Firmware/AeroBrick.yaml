esphome:
  name: aerobrick-v1
  friendly_name: AeroBrick Air Quality Sensor
  name_add_mac_suffix: true
  platformio_options:
    upload_speed: 921600
    board_build.flash_mode: qio
    board_build.psram_type: opi
    board_build.f_flash: 80000000L
    board_build.f_cpu: 240000000L

  min_version: 2025.6.2

  project:
    name: "BlueMustrad.AeroBrick"
    version: "${version}"

dashboard_import:
  package_import_url: https://github.com/BlueMustrad/AeroBrick/blob/main/Firmware/AeroBrick.yaml@main
  import_full_config: true

ota:
  - platform: esphome
    id: ota_default

wifi:
  on_connect:
    - delay: 5s # Gives time for improv results to be transmitted

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "AeroBrick Hotspot"

packages:
  remote_package:
    url: https://github.com/BlueMustrad/AeroBrick/
    ref: main
    files:
      - Firmware/AeroBrick Core.yaml
    refresh: 0d
