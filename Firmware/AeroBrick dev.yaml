esphome:
  name: aerobrick-v1
  friendly_name: AeroBrick Air Quality Sensor
  platformio_options:
    upload_speed: 921600
    build_unflags: -Werror=all
    board_build.flash_mode: dio
    board_build.f_flash: 80000000L
    board_build.f_cpu: 240000000L

  project:
    name: "BlueMustrad.AeroBrick-v1"
    version: "${version}"

dashboard_import:
  package_import_url: https://github.com/BlueMustrad/AeroBrick/blob/main/Firmware/AeroBrick.yaml@main
  import_full_config: true

ota:
  - platform: esphome

wifi:
  # Disable power save more for compatibility with some Ubiquiti networks.
  power_save_mode: none

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "AeroBrick Hotspot"

improv_serial:

web_server:
  version: 3

packages:
  core: !include AeroBrick Core.yaml

# Add local timezone for development since Docker container not set to local timezone
time:
  - platform: homeassistant
    id: !extend ha_time
    timezone: "America/Chicago"

# required to disable wifi power save mode
esp32_improv: !remove
